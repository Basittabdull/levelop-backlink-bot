<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Levelop Backlink Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --accent: #534AB7;
    --accent-light: #EEEDFE;
    --accent-dark: #3C3489;
    --success-bg: #EAF3DE;
    --success-text: #27500A;
    --error-bg: #FCEBEB;
    --error-text: #791F1F;
    --info-bg: #EEEDFE;
    --info-text: #3C3489;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .wrapper { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  header h1 span.logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .badge { background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
  label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
    background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 12px; outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .input-with-btn { display: flex; gap: 8px; }
  .input-with-btn input { flex: 1; }
  .btn { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: var(--radius-sm); padding: 8px 16px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; }
  .btn:hover { background: var(--bg); border-color: var(--border-hover); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-accent { background: var(--accent); color: white; border-color: var(--accent); width: 100%; padding: 11px 20px; font-size: 15px; }
  .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .show-btn { padding: 8px 12px; font-size: 13px; white-space: nowrap; }
  .platforms { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .platform-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 7px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-muted); transition: all 0.15s; user-select: none; }
  .platform-toggle.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); font-weight: 500; }
  .platform-toggle input { display: none; }
  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag { font-size: 12px; padding: 4px 10px; border-radius: 999px; background: var(--bg); color: var(--text-muted); cursor: pointer; border: 0.5px solid var(--border); transition: all 0.15s; }
  .tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .status { border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; line-height: 1.6; margin-top: 1rem; display: none; }
  .status.info { background: var(--info-bg); color: var(--info-text); display: block; }
  .status.success { background: var(--success-bg); color: var(--success-text); display: block; }
  .status.error { background: var(--error-bg); color: var(--error-text); display: block; }
  .preview-box { background: var(--bg); border-radius: var(--radius-sm); padding: 1rem; font-size: 13px; line-height: 1.7; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--text); display: none; margin-bottom: 1rem; border: 0.5px solid var(--border); }
  a.result-link { color: var(--accent); text-decoration: underline; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
  #preview-card { display: none; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1><span class="logo">L</span> Levelop Backlink Bot</h1>
    <p>Generate SEO articles with Claude and auto-publish to Dev.to and Hashnode.</p>
  </header>

  <!-- API Keys -->
  <div class="card">
    <div class="card-title"><span class="badge">Step 1</span> API keys</div>
    <div class="field">
      <label>Dev.to API key</label>
      <div class="input-with-btn">
        <input type="password" id="devto-key" placeholder="Paste your Dev.to key…"/>
        <button class="btn show-btn" onclick="toggleVis('devto-key', this)">Show</button>
      </div>
    </div>
    <div class="field">
      <label>Hashnode API key <span style="font-size:11px;">(optional)</span></label>
      <div class="input-with-btn">
        <input type="password" id="hashnode-key" placeholder="Paste your Hashnode key…"/>
        <button class="btn show-btn" onclick="toggleVis('hashnode-key', this)">Show</button>
      </div>
    </div>
    <div class="field">
      <label>Hashnode publication ID <span style="font-size:11px;">(optional — from your Hashnode dashboard URL)</span></label>
      <input type="text" id="hashnode-pub" placeholder="e.g. 64a1b2c3d4e5f6a7b8c9d0e1"/>
    </div>
  </div>

  <!-- Topic -->
  <div class="card">
    <div class="card-title"><span class="badge">Step 2</span> Article topic</div>
    <div class="field">
      <div class="input-with-btn">
        <input type="text" id="topic-input" placeholder="e.g. Top 10 DSA patterns for FAANG interviews"/>
        <button class="btn btn-sm" onclick="suggestTopics()">✦ Suggest</button>
      </div>
      <div class="tags-row" id="topic-suggestions"></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title"><span class="badge">Step 3</span> Settings</div>
    <div class="row field">
      <div>
        <label>Article length</label>
        <select id="article-length">
          <option value="short">Short (~600 words)</option>
          <option value="medium" selected>Medium (~1000 words)</option>
          <option value="long">Long (~1500 words)</option>
        </select>
      </div>
      <div>
        <label>Tone</label>
        <select id="article-tone">
          <option value="practical">Practical &amp; direct</option>
          <option value="conversational">Conversational</option>
          <option value="technical">Technical deep-dive</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Publish to</label>
      <div class="platforms">
        <label class="platform-toggle active" id="toggle-devto">
          <input type="checkbox" checked onchange="updateToggle('toggle-devto', this)"> Dev.to
        </label>
        <label class="platform-toggle" id="toggle-hashnode">
          <input type="checkbox" onchange="updateToggle('toggle-hashnode', this)"> Hashnode
        </label>
      </div>
    </div>
  </div>

  <!-- Generate -->
  <button class="btn btn-full" id="generate-btn" onclick="generateArticle()" style="padding:11px; font-size:15px; font-weight:500; margin-bottom:1rem;">
    ✦ Generate article
  </button>

  <!-- Preview + Publish -->
  <div class="card" id="preview-card">
    <div class="card-title"><span class="badge">Preview</span> Generated article</div>
    <div class="preview-box" id="article-preview"></div>
    <button class="btn btn-accent" id="publish-btn" onclick="publishArticle()">Publish now →</button>
  </div>

  <div class="status" id="status-box"></div>
</div>

<script>
  const BACKLINK = 'https://levelop.dev';
  const PROXY = '/api/claude';
  let generatedTitle = '', generatedBody = '';

  function toggleVis(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
  }

  function updateToggle(id, cb) {
    document.getElementById(id).classList.toggle('active', cb.checked);
  }

  function setStatus(html, type) {
    const box = document.getElementById('status-box');
    box.className = 'status ' + type;
    box.innerHTML = html;
  }

  async function callClaude(prompt, maxTokens = 300) {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, max_tokens: maxTokens })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.text;
  }

  async function suggestTopics() {
    const container = document.getElementById('topic-suggestions');
    container.innerHTML = '<span style="font-size:12px;color:#6b7280;">Thinking…</span>';
    try {
      const text = await callClaude(
        'Suggest 6 SEO blog article topics for levelop.dev, an AI-powered coding interview prep platform for 2-6 year experience engineers targeting FAANG. Topics should naturally mention interview prep so a backlink to levelop.dev fits organically. Return ONLY a JSON array of 6 short topic strings, no markdown, no preamble.'
      );
      const topics = JSON.parse(text.replace(/```json|```/g, '').trim());
      container.innerHTML = '';
      topics.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = t;
        tag.onclick = () => { document.getElementById('topic-input').value = t; };
        container.appendChild(tag);
      });
    } catch(e) {
      container.innerHTML = '<span style="font-size:12px;color:#791F1F;">Could not fetch suggestions.</span>';
    }
  }

  async function generateArticle() {
    const topic = document.getElementById('topic-input').value.trim();
    if (!topic) { setStatus('Please enter a topic first.', 'error'); return; }
    const length = document.getElementById('article-length').value;
    const tone = document.getElementById('article-tone').value;
    const wordCount = length === 'short' ? 600 : length === 'medium' ? 1000 : 1500;
    const btn = document.getElementById('generate-btn');
    btn.disabled = true; btn.textContent = 'Generating…';
    setStatus('Generating article with Claude…', 'info');
    try {
      const text = await callClaude(
        `Write a ${wordCount}-word ${tone} blog article about: "${topic}".
Requirements:
- Written for software engineers with 2-6 years experience
- Practical, actionable advice
- Include 1-2 clickable markdown hyperlinks to Levelop naturally in the text, formatted exactly like this: [Levelop](https://levelop.dev) — embed them in a sentence, not just at the end
- Use markdown formatting with ## headings
- End with a short conclusion
- Last line must be: TAGS: tag1, tag2, tag3, tag4
Write only the article. Start with the title as # Title.`, 2500);
      const titleMatch = text.match(/^#\s+(.+)/m);
      generatedTitle = titleMatch ? titleMatch[1].trim() : topic;
      generatedBody = text;
      const preview = document.getElementById('article-preview');
      preview.textContent = text;
      preview.style.display = 'block';
      document.getElementById('preview-card').style.display = 'block';
      setStatus('Article ready. Review it above, then publish.', 'success');
    } catch(e) {
      setStatus('Error: ' + e.message, 'error');
    }
    btn.disabled = false; btn.textContent = '✦ Regenerate article';
  }

  function extractTags(body) {
    const match = body.match(/TAGS:\s*(.+)/i);
    return match ? match[1].split(',').map(t => t.trim()).filter(Boolean) : ['programming', 'career', 'interviews'];
  }

  function cleanBody(body) {
    return body.replace(/TAGS:.*$/im, '').trim();
  }

  async function publishToDevTo(apiKey, title, body, tags) {
    const res = await fetch('https://dev.to/api/articles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-key': apiKey },
      body: JSON.stringify({ article: { title, body_markdown: body, published: true, tags: tags.slice(0, 4), canonical_url: BACKLINK } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || JSON.stringify(data));
    return data.url;
  }

  async function publishToHashnode(apiKey, pubId, title, body) {
    const res = await fetch('https://gql.hashnode.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
      body: JSON.stringify({
        query: `mutation PublishPost($input: PublishPostInput!) { publishPost(input: $input) { post { url } } }`,
        variables: { input: { title, contentMarkdown: body, publicationId: pubId, tags: [], originalArticleURL: BACKLINK } }
      })
    });
    const data = await res.json();
    if (data.errors) throw new Error(data.errors[0].message);
    return data.data?.publishPost?.post?.url || 'https://hashnode.com';
  }

  async function publishArticle() {
    if (!generatedBody) { setStatus('Generate an article first.', 'error'); return; }
    const devtoKey = document.getElementById('devto-key').value.trim();
    const hashnodeKey = document.getElementById('hashnode-key').value.trim();
    const hashnodePub = document.getElementById('hashnode-pub').value.trim();
    const toDevTo = document.getElementById('toggle-devto').classList.contains('active');
    const toHashnode = document.getElementById('toggle-hashnode').classList.contains('active');
    if (toDevTo && !devtoKey) { setStatus('Please enter your Dev.to API key.', 'error'); return; }
    if (toHashnode && (!hashnodeKey || !hashnodePub)) { setStatus('Please enter your Hashnode API key and publication ID.', 'error'); return; }
    const btn = document.getElementById('publish-btn');
    btn.disabled = true; btn.textContent = 'Publishing…';
    setStatus('Publishing…', 'info');
    const tags = extractTags(generatedBody);
    const body = cleanBody(generatedBody);
    const results = [], errors = [];
    if (toDevTo) {
      try { results.push(`✓ Dev.to: <a class="result-link" href="${await publishToDevTo(devtoKey, generatedTitle, body, tags)}" target="_blank">View article →</a>`); }
      catch(e) { errors.push('Dev.to error: ' + e.message); }
    }
    if (toHashnode) {
      try { results.push(`✓ Hashnode: <a class="result-link" href="${await publishToHashnode(hashnodeKey, hashnodePub, generatedTitle, body)}" target="_blank">View article →</a>`); }
      catch(e) { errors.push('Hashnode error: ' + e.message); }
    }
    let msg = '';
    if (results.length) msg += '<strong>Published!</strong><br>' + results.join('<br>');
    if (errors.length) msg += (msg ? '<br><br>' : '') + errors.join('<br>');
    setStatus(msg, results.length ? 'success' : 'error');
    btn.disabled = false; btn.textContent = 'Publish again →';
  }
</script>
</body>
</html>
